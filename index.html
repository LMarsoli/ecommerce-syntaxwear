<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Tênis e Sneakers Online</title>
  <meta name="description"
    content="Descubra a coleção exclusiva de tênis e sneakers da SyntaxWear. Estilo, conforto e inovação para os amantes de calçados. Compre online agora!">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/hero.css">
  <link rel="stylesheet" href="./css/components/product-category.css">
  <link rel="stylesheet" href="./css/components/product-grid.css">

</head>


<body>
  <header class="header">
    <!-- menu / navegação -->
    <h1 class="logo">
      <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
        <img src="./images/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online">
      </a>
    </h1>
    <nav class="nav-center" aria-label="Categorias Principais">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Outlet</a></li>
      </ul>
    </nav>

    <!-- secondary nav with account/links right after central menu -->
    <nav class="nav-right" aria-label="Ações e Informações">
      <ul>
        <li><a href="#">Nossas lojas</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#" aria-label="Minha conta"><img src="./images/icons/user.svg.svg" alt="Minha conta"></a></li>
        <li><a href="#" aria-label="Ajuda"><img src="./images/icons/help.svg.svg" alt="Ajuda"></a></li>
        <li><a href="#" aria-label="Carrinho"><img src="./images/icons/bag.svg.svg" alt="Carrinho"></a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero-section">
      <!-- HERO (banner principal) -->
      <div class="hero-overlay">
        <div class="hero-content">
          <span class="hero-subtitle">Krypton One</span>
          <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
          <div class="hero-buttons">
            <a href="#" class="btn btn-outline">Ver Modelos</a>
            <a href="#" class="btn btn-filled">Comprar</a>
          </div>
        </div>
      </div>

    </section>

    <section class="categories-section">
      <!-- CATEGORIAS: casual / esporte / moderno / futurista -->

      <div class="category-card casual">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">casual</span>
        </a>
      </div>
      <div class="category-card esporte">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">esporte</span>
        </a>
      </div>
      <div class="category-card moderno">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">moderno</span>
        </a>
      </div>
      <div class="category-card futurista">
        <a href="#">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">futurista</span>
        </a>
      </div>
    </section>

    <section class="promo-banner">
      <!-- BANNER PROMOCIONAL -->
    </section>

    <section class="grid-section">
      <!-- GRID DE PRODUTOS -->
      <div class="card highlight">
        <div class="top1-content">
          <h3 class="card-title">Krypton One</h3>
          <p class="card-subtitle">
            Estilo urbano com atitude
          </p>
          <div class="cta-group">
            <a href="#" class="btn btn-outline">feminino
              <a href="#" class="btn btn-outline">masculino</a>
            </a>
          </div>
        </div>
      </div>
      <div class="card sneaker-purple"></div>
      <div class="card model"></div>
      <div class="card sneaker-color"></div>
      <div class="card sneaker-white"></div>
      <div class="card sneaker-silver"></div>
    </section>
  </main>

  <footer class="site-footer">

  </footer>
</body>

</html>
